<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa do Mundo 2026 – Ao Vivo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #player-wrapper {
      flex: 1;
      position: relative;
    }
    #player-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    #status-bar {
      height: 36px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 13px;
      color: #aaa;
      flex-shrink: 0;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4444;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .live-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div id="player-wrapper">
    <iframe
      src="https://www.youtube.com/embed/EYStZQ5FsVk?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1&origin=https://cleisonfilho.github.io"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
  <div id="status-bar">
    <div class="live-badge">
      <div class="dot"></div>
      <span>Ao vivo</span>
    </div>
    <span>CazéTV – Copa do Mundo 2026</span>
    <span id="clock"></span>
  </div>
  <script>
    // Atualiza o relógio na barra inferior
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
