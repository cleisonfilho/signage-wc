<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa do Mundo 2026 – Ao Vivo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #player-wrapper {
      flex: 1;
      position: relative;
      background: #000;
    }

    #player-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #status-bar {
      height: 36px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 13px;
      color: #aaa;
      flex-shrink: 0;
    }

    #status-bar .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4444;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #status-bar .live-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #overlay-loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #overlay-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #overlay-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #overlay-loading p {
      font-size: 14px;
      color: #888;
    }

    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 32px;
    }

    #error-msg.visible {
      display: flex;
    }

    #error-msg h2 {
      font-size: 20px;
      color: #fff;
    }

    #error-msg p {
      font-size: 14px;
      color: #888;
      max-width: 400px;
    }

    #error-msg button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="overlay-loading">
    <div class="spinner"></div>
    <p>Buscando transmissão ao vivo…</p>
  </div>

  <div id="error-msg">
    <h2>Nenhuma live encontrada</h2>
    <p>A CazéTV não está transmitindo nenhum jogo agora. Tente novamente quando houver uma partida ao vivo.</p>
    <button onclick="init()">Tentar novamente</button>
  </div>

  <div id="player-wrapper"></div>

  <div id="status-bar">
    <div class="live-badge">
      <div class="dot"></div>
      <span>Ao vivo</span>
    </div>
    <span id="status-text">CazéTV – Copa do Mundo 2026</span>
    <span id="next-refresh"></span>
  </div>

  <script>
    // ── Configurações ──────────────────────────────────────────────
    const CHANNEL_ID   = 'UCkMoF1FvSbrO21X03Vt9UeA'; // CazéTV
    const REFRESH_MIN  = 10; // minutos entre re-buscas automáticas
    // ──────────────────────────────────────────────────────────────

    const CORS_PROXY   = 'https://corsproxy.io/?';
    const RSS_URL      = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;

    let refreshTimer   = null;
    let countdownTimer = null;
    let secondsLeft    = REFRESH_MIN * 60;

    async function fetchLiveVideoId() {
      try {
        const res  = await fetch(CORS_PROXY + encodeURIComponent(RSS_URL));
        const text = await res.text();
        const doc  = new DOMParser().parseFromString(text, 'application/xml');
        const entries = doc.querySelectorAll('entry');

        for (const entry of entries) {
          const videoId = entry.querySelector('videoId')?.textContent?.trim();
          const title   = entry.querySelector('title')  ?.textContent?.trim() || '';
          if (!videoId) continue;

          // Verifica se o vídeo está realmente ao vivo via oembed
          try {
            const oembed = await fetch(
              `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`
            );
            if (!oembed.ok) continue;
            const data = await oembed.json();
            // oembed retorna thumbnail específica para lives
            if (data.thumbnail_url && data.thumbnail_url.includes('hqdefault_live')) {
              return { videoId, title };
            }
          } catch (_) { continue; }
        }
        return null;
      } catch (err) {
        console.error('Erro ao buscar RSS:', err);
        return null;
      }
    }

    function renderPlayer(videoId) {
      const origin  = encodeURIComponent(location.origin || 'https://localhost');
      const wrapper = document.getElementById('player-wrapper');
      wrapper.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1&origin=${origin}"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>`;
    }

    function showError() {
      document.getElementById('error-msg').classList.add('visible');
      document.getElementById('player-wrapper').innerHTML = '';
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      secondsLeft = REFRESH_MIN * 60;
      countdownTimer = setInterval(() => {
        secondsLeft--;
        const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
        const s = String(secondsLeft % 60).padStart(2, '0');
        document.getElementById('next-refresh').textContent = `Próxima verificação: ${m}:${s}`;
        if (secondsLeft <= 0) {
          clearInterval(countdownTimer);
          init();
        }
      }, 1000);
    }

    async function init() {
      hideError();
      document.getElementById('overlay-loading').classList.remove('hidden');

      const result = await fetchLiveVideoId();

      document.getElementById('overlay-loading').classList.add('hidden');

      if (result) {
        renderPlayer(result.videoId);
        document.getElementById('status-text').textContent =
          result.title ? `CazéTV – ${result.title}` : 'CazéTV – Copa do Mundo 2026';
      } else {
        showError();
      }

      startCountdown();
    }

    init();
  </script>
</body>
</html>
