<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa do Mundo 2026 – Ao Vivo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Arial', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #player-wrapper {
      flex: 1;
      position: relative;
      background: #000;
    }

    #player-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #status-bar {
      height: 36px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 13px;
      color: #aaa;
      flex-shrink: 0;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ff4444;
      font-weight: bold;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .live-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #overlay-loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #overlay-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #overlay-loading p { font-size: 14px; color: #888; }

    #error-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 32px;
    }

    #error-msg.visible { display: flex; }
    #error-msg h2 { font-size: 20px; color: #fff; }
    #error-msg p  { font-size: 14px; color: #888; max-width: 400px; }

    #error-msg button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="overlay-loading">
    <div class="spinner"></div>
    <p id="loading-text">Buscando transmissão ao vivo…</p>
  </div>

  <div id="error-msg">
    <h2>Nenhuma live encontrada</h2>
    <p>A CazéTV não está transmitindo nenhum jogo agora.<br>A página vai verificar automaticamente.</p>
    <button onclick="init()">Verificar agora</button>
  </div>

  <div id="player-wrapper"></div>

  <div id="status-bar">
    <div class="live-badge">
      <div class="dot"></div>
      <span>Ao vivo</span>
    </div>
    <span id="status-text">CazéTV – Copa do Mundo 2026</span>
    <span id="next-refresh"></span>
  </div>

  <script>
    // ── Configurações ──────────────────────────────────────────────
    const CHANNEL_ID  = 'UCZiYbVptd3PVPf4f6eR6UaQ'; // CazéTV (ID correto)
    const REFRESH_MIN = 10; // minutos entre re-buscas
    // ──────────────────────────────────────────────────────────────

    // Proxies CORS em ordem de preferência — tenta o próximo se falhar
    const PROXIES = [
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://cors-anywhere.herokuapp.com/${url}`,
    ];

    const RSS_URL = `https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`;

    let countdownTimer = null;
    let secondsLeft    = REFRESH_MIN * 60;

    async function fetchWithProxy(url) {
      for (const makeProxy of PROXIES) {
        try {
          const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
          if (res.ok) return await res.text();
        } catch (_) { /* tenta próximo */ }
      }
      return null;
    }

    async function fetchLiveVideoId() {
      const text = await fetchWithProxy(RSS_URL);
      if (!text) return null;

      const doc     = new DOMParser().parseFromString(text, 'application/xml');
      const entries = doc.querySelectorAll('entry');

      for (const entry of entries) {
        // namespace yt: para videoId
        const videoIdEl = entry.getElementsByTagNameNS('http://www.youtube.com/xml/schemas/2015', 'videoId')[0]
                       || entry.querySelector('videoId');
        const videoId   = videoIdEl?.textContent?.trim();
        const title     = entry.querySelector('title')?.textContent?.trim() || '';
        if (!videoId) continue;

        // Verifica se está ao vivo via oEmbed (thumbnail _live = live ativo)
        try {
          const oRes = await fetch(
            `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`,
            { signal: AbortSignal.timeout(5000) }
          );
          if (!oRes.ok) continue;
          const data = await oRes.json();
          if (data.thumbnail_url?.includes('hqdefault_live')) {
            return { videoId, title };
          }
        } catch (_) { continue; }
      }
      return null;
    }

    function renderPlayer(videoId) {
      const origin  = encodeURIComponent(location.origin);
      document.getElementById('player-wrapper').innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1&origin=${origin}"
          allow="autoplay; fullscreen"
          allowfullscreen>
        </iframe>`;
    }

    function showError() {
      document.getElementById('error-msg').classList.add('visible');
      document.getElementById('player-wrapper').innerHTML = '';
    }

    function hideError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      secondsLeft    = REFRESH_MIN * 60;
      countdownTimer = setInterval(() => {
        secondsLeft--;
        const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
        const s = String(secondsLeft % 60).padStart(2, '0');
        document.getElementById('next-refresh').textContent = `Próxima verificação: ${m}:${s}`;
        if (secondsLeft <= 0) { clearInterval(countdownTimer); init(); }
      }, 1000);
    }

    async function init() {
      hideError();
      document.getElementById('overlay-loading').classList.remove('hidden');
      document.getElementById('loading-text').textContent = 'Buscando transmissão ao vivo…';

      const result = await fetchLiveVideoId();

      document.getElementById('overlay-loading').classList.add('hidden');

      if (result) {
        renderPlayer(result.videoId);
        document.getElementById('status-text').textContent =
          result.title ? `CazéTV – ${result.title}` : 'CazéTV – Copa do Mundo 2026';
      } else {
        showError();
      }

      startCountdown();
    }

    init();
  </script>
</body>
</html>
